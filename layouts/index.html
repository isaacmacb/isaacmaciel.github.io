<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Site.Title }}</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1s ease-in-out;
    }

    .avatar-wrapper {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      padding: 6px;
      background: linear-gradient(135deg, #ff3b3b, #a100ff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(255, 59, 59, 0.3);
    }

    .avatar-wrapper img {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.6rem;
      font-weight: 700;
    }

    p.subtitle {
      font-size: 1.2rem;
      opacity: 0.8;
      margin-top: 10px;
    }

    .stack {
      margin-top: 15px;
      font-size: 0.95rem;
      opacity: 0.7;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn-primary {
      background: #ff3b3b;
      color: white;
    }

    .btn-primary:hover {
      background: #ff1f1f;
    }

    .btn-secondary {
      border: 1px solid #444;
      color: white;
    }

    .btn-secondary:hover {
      border-color: #ff3b3b;
    }

    /* 🌐 Redes sociais */
    .socials {
      margin-top: 25px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .socials a {
      padding: 8px 14px;
      border: 1px solid #333;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .socials a:hover {
      border-color: #ff3b3b;
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <section class="hero">

    <!-- FOTO CENTRAL -->
    <div class="avatar-wrapper">
      <img src="/images/perfil.png" alt="Foto de Perfil">
    </div>

    <!-- NOME -->
    <h1>Isaac Maciel</h1>

    <!-- SUBTÍTULO -->
    <p class="subtitle">
      Backend Developer | Data Analysis
    </p>

    <!-- STACK -->
    <div class="stack">
    </div>

    <!-- BOTÕES -->
    <div class="buttons">
      <a href="/projects" class="btn btn-primary">Ver Projetos</a>
      <a href="/posts" class="btn btn-secondary">Artigos</a>
      <a href="https://github.com/" class="btn btn-secondary">GitHub</a>
    </div>

    <!-- 🌐 CONTATOS -->
   <div class="socials">
  <a href="https://wa.me/85994084279" target="_blank">📱 WhatsApp</a>
  <a href="https://www.linkedin.com/in/isaac-maciel-044a14321/?isSelfProfile=false" target="_blank">🔗 LinkedIn</a>
</div>

  </section>

</body>
</html>
